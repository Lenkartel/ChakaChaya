<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#059669"/>
<title>Cash Credited · ChakaChaya</title>
<link rel="icon" href="assets/ecocash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#00355F;--navy-dark:#001F3A;
  --blue:#009FDB;--cyan:#00C9E0;
  --gold:#f59e0b;--gold-light:#fcd34d;
  --green:#059669;--green-pale:#ecfdf5;--green-border:#a7f3d0;
  --page:#EEF8FC;--white:#fff;
  --border:rgba(0,53,95,.1);--border-strong:rgba(0,53,95,.2);
  --ink:#0a1f44;--ink-soft:#6b82a8;--ink-faint:#9eb5d4;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:12px;--r-lg:18px;--r-xl:24px;
  --shadow:0 1px 4px rgba(0,53,95,.08),0 4px 16px rgba(0,53,95,.07);
  --shadow-lg:0 2px 12px rgba(0,53,95,.12),0 8px 32px rgba(0,53,95,.1);
}
@keyframes pageEnter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:var(--font);background:var(--page)}
.screen{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh;overflow:hidden;position:relative;animation:pageEnter .38s cubic-bezier(.22,1,.36,1) both}

/* NAV CURTAIN */
.nav-curtain{position:fixed;inset:0;background:linear-gradient(155deg,#001F3A 0%,#005F3A 60%,#059669 100%);opacity:1;pointer-events:none;z-index:9999;transition:opacity .4s cubic-bezier(.4,0,.2,1)}
.nav-curtain.clear{opacity:0}

/* CANVAS */
.fw-canvas{position:fixed;inset:0;pointer-events:none!important;z-index:1;width:100%;height:100%;display:block}

/* HEADER */
.header{
  background:linear-gradient(135deg,#001F3A 0%,#003320 50%,#059669 100%);
  padding:max(14px,env(safe-area-inset-top)) 18px 22px;
  flex-shrink:0;position:relative;overflow:hidden;
}
.header::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 220px 180px at 108% -15%,rgba(34,197,94,.28),transparent 60%),radial-gradient(ellipse 160px 120px at -10% 110%,rgba(245,158,11,.14),transparent 54%)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:relative;z-index:2}
.brand{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.95);padding:5px 10px;border-radius:10px}
.brand img{height:22px;object-fit:contain}
.brand-sep{width:1px;height:15px;background:rgba(0,0,0,.1)}
.status-chip{background:rgba(52,211,153,.2);border:1px solid rgba(52,211,153,.35);backdrop-filter:blur(8px);padding:5px 13px;border-radius:999px;font-size:11px;font-weight:700;color:#6ee7b7;letter-spacing:.3px}
.header-body{position:relative;z-index:2}
.hdr-eyebrow{font-size:9px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px}
.hdr-amount-row{display:flex;align-items:flex-end;gap:4px;margin-bottom:16px}
.hdr-cur{font-family:var(--mono);font-size:13px;font-weight:500;color:rgba(255,255,255,.45);margin-bottom:5px;font-feature-settings:"tnum"}
.hdr-amount{font-family:var(--mono);font-size:44px;font-weight:900;color:#fff;line-height:1;letter-spacing:-.04em;font-feature-settings:"tnum","ss01";text-shadow:0 2px 16px rgba(52,197,94,.4)}
.success-row{display:flex;align-items:center;gap:14px}
.success-icon{width:42px;height:42px;border-radius:50%;background:rgba(52,211,153,.2);border:1.5px solid rgba(52,211,153,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:iconPop .5s .2s cubic-bezier(.34,1.56,.64,1) both}
@keyframes iconPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon svg{stroke:#6ee7b7;width:20px;height:20px}
.success-text{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.2px}
.success-sub{font-size:11px;color:rgba(255,255,255,.5);font-weight:500;margin-top:2px}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:18px 16px max(32px,env(safe-area-inset-bottom));overscroll-behavior:contain;min-height:0;position:relative;z-index:5;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:var(--green);border-radius:999px}

/* REDEMPTION CARD */
@keyframes cardIn{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.redeem-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-xl);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow-lg);animation:cardIn .48s .06s cubic-bezier(.34,1.56,.64,1) both}
.redeem-card-top{background:linear-gradient(135deg,#001F3A,#00355F);padding:16px 18px;display:flex;align-items:center;justify-content:space-between}
.rct-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-.2px}
.rct-sub{font-size:11px;color:rgba(255,255,255,.5);font-weight:500;margin-top:2px}
.rct-badge{background:rgba(52,211,153,.2);border:1px solid rgba(52,211,153,.3);border-radius:999px;padding:4px 10px;font-size:10px;font-weight:700;color:#4ade80;letter-spacing:.3px;white-space:nowrap}
.redeem-amounts{display:flex;gap:10px;padding:16px 18px}
.ra-block{flex:1;border-radius:var(--r-lg);padding:14px;text-align:center}
.ra-pts{background:#EEF8FC}
.ra-cash{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #a7f3d0}
.ra-val{font-family:var(--mono);font-size:22px;font-weight:900;line-height:1;font-feature-settings:"tnum"}
.ra-pts .ra-val{color:#00355F}
.ra-cash .ra-val{color:#059669}
.ra-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.ra-pts .ra-lbl{color:#9eb5d4}
.ra-cash .ra-lbl{color:#6ee7b7}

/* DETAILS */
.detail-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow);animation:cardIn .48s .14s cubic-bezier(.34,1.56,.64,1) both}
.detail-head{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:800;color:var(--ink);letter-spacing:-.1px}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border)}
.detail-row:last-child{border-bottom:none}
.dr-key{font-size:12px;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:8px}
.dr-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dr-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);font-feature-settings:"tnum"}
.dr-val.green{color:var(--green);font-weight:800}

/* NOTICE */
.notice{background:rgba(5,150,105,.06);border:1px solid rgba(5,150,105,.18);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;font-size:12px;line-height:1.7;color:var(--ink-soft);font-weight:500;animation:cardIn .48s .22s cubic-bezier(.34,1.56,.64,1) both}
.notice strong{color:var(--ink);font-weight:700}

/* SECURITY */
.sec-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);padding:12px 0;box-shadow:var(--shadow);animation:cardIn .48s .28s cubic-bezier(.34,1.56,.64,1) both}
.sec-row{display:flex;align-items:center;justify-content:center}
.sec-badge{display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;color:var(--green);letter-spacing:.4px;text-transform:uppercase;padding:0 14px}
.sec-badge+.sec-badge{border-left:1px solid var(--border)}
.sec-badge svg{opacity:.8;stroke:var(--green)}
.powered{text-align:center;padding:8px 0 2px;font-size:9px;color:var(--ink-faint);font-weight:600;letter-spacing:.4px;text-transform:uppercase}

/* REF NUMBER */
.ref-row{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 0;font-size:11px;color:var(--ink-faint);font-weight:600}
.ref-code{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--ink-soft);background:#EEF8FC;padding:3px 10px;border-radius:999px;border:1px solid var(--border)}
</style>
</head>
<body>
<canvas class="fw-canvas" id="fwCanvas"></canvas>
<div class="nav-curtain" id="navCurtain"></div>

<div class="screen">
  <div class="header">
    <div class="header-top">
      <div class="brand"><img src="assets/econet.png" alt="Econet"><div class="brand-sep"></div><img src="assets/ecocash.png" alt="EcoCash"></div>
      <div class="status-chip">Credited ✓</div>
    </div>
    <div class="header-body">
      <div class="hdr-eyebrow">💰 ChakaChaya Cash Credited</div>
      <div class="hdr-amount-row">
        <span class="hdr-cur">USD</span>
        <span class="hdr-amount" id="headerAmount">0.00</span>
      </div>
      <div class="success-row">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <div class="success-text">Cash Credited! · Makorokoto! 🎉</div>
          <div class="success-sub">Funds are now in your EcoCash wallet</div>
        </div>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- Filled by JS -->
  </div>
</div>

<script>
function haptic(s){if(!navigator.vibrate)return;var p={success:[12,60,12],medium:22};try{navigator.vibrate(p[s]||12)}catch(e){}}

(function main(){
  /* ── CURTAIN REVEAL ── */
  const curtain = document.getElementById('navCurtain');
  requestAnimationFrame(() => setTimeout(() => curtain.classList.add('clear'), 40));

  /* ── BACK → INDEX ── */
  history.replaceState({page:'thankyou'}, '', '');
  window.addEventListener('popstate', () => {
    sessionStorage.removeItem('redeemData');
    window.location.href = 'index.html';
  }, {passive: false});

  /* ── READ REDEEM DATA ── */
  let rd = {};
  try { rd = JSON.parse(sessionStorage.getItem('redeemData') || '{}'); } catch(e) {}

  const points   = rd.points || 0;
  const usd      = rd.usd || '0.00';
  const usdFmt   = rd.usdFormatted || ('USD ' + usd);
  const rate     = rd.rate || '100 pts = USD 5.00';
  const ts       = rd.timestamp ? new Date(rd.timestamp).toLocaleString() : new Date().toLocaleString();
  const refNo    = 'CKC-' + Math.random().toString(36).slice(2,5).toUpperCase() + '-' + Date.now().toString(36).slice(-4).toUpperCase();

  /* ── HEADER COUNT-UP ── */
  const amtEl = document.getElementById('headerAmount');
  const target = parseFloat(usd) || 0;
  if (target > 0) {
    const start = performance.now();
    function tick(ts2) {
      const p = Math.min((ts2 - start) / 700, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      amtEl.textContent = (target * ease).toFixed(2);
      if (p < 1) requestAnimationFrame(tick);
      else amtEl.textContent = target.toFixed(2);
    }
    requestAnimationFrame(tick);
  } else {
    amtEl.textContent = parseFloat(usd).toFixed(2);
  }

  /* ── BUILD BODY ── */
  const body = document.querySelector('.body');

  // Redemption card
  const redeemCard = document.createElement('div');
  redeemCard.className = 'redeem-card';
  redeemCard.innerHTML = `
    <div class="redeem-card-top">
      <div>
        <div class="rct-title">🏆 ChakaChaya Redeemed</div>
        <div class="rct-sub">Points converted to EcoCash cash</div>
      </div>
      <div class="rct-badge">Credited ✓</div>
    </div>
    <div class="redeem-amounts">
      <div class="ra-block ra-pts">
        <div class="ra-val">${Number(points).toLocaleString()}</div>
        <div class="ra-lbl">Points Redeemed</div>
      </div>
      <div class="ra-block ra-cash">
        <div class="ra-val">${usdFmt}</div>
        <div class="ra-lbl">Cash Received</div>
      </div>
    </div>`;
  body.appendChild(redeemCard);

  // Detail card
  function mkIcon(colour, svgPath) {
    return `<div class="dr-icon" style="background:${colour}20;color:${colour}">${svgPath}</div>`;
  }
  const svgClock = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const svgRate  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>`;
  const svgTick  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const svgRef   = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

  const detailCard = document.createElement('div');
  detailCard.className = 'detail-card';
  detailCard.innerHTML = `
    <div class="detail-head">Redemption Details</div>
    <div class="detail-row">
      <div class="dr-key">${mkIcon('#009FDB',svgRate)} Conversion Rate</div>
      <div class="dr-val">${rate}</div>
    </div>
    <div class="detail-row">
      <div class="dr-key">${mkIcon('#059669',svgTick)} Cash Credited</div>
      <div class="dr-val green">${usdFmt}</div>
    </div>
    <div class="detail-row">
      <div class="dr-key">${mkIcon('#f59e0b',svgClock)} Date & Time</div>
      <div class="dr-val">${ts}</div>
    </div>
    <div class="detail-row">
      <div class="dr-key">${mkIcon('#6366f1',svgRef)} Reference</div>
      <div class="dr-val">${refNo}</div>
    </div>`;
  body.appendChild(detailCard);

  // Notice
  const notice = document.createElement('div');
  notice.className = 'notice';
  notice.innerHTML = `<strong>Congratulations · Makorokoto!</strong> Your ChakaChaya points have been successfully redeemed. <strong>${usdFmt}</strong> has been credited to your EcoCash wallet and is available for use immediately. Thank you for participating in the EcoCash Rewards Programme.`;
  body.appendChild(notice);

  // Security
  const secCard = document.createElement('div');
  secCard.className = 'sec-card';
  secCard.innerHTML = `
    <div class="sec-row">
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>256-bit SSL</div>
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>PCI DSS</div>
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Econet Verified</div>
    </div>
    <div class="powered">Powered by Econet EcoCash Zimbabwe · ChakaChaya Rewards</div>`;
  body.appendChild(secCard);

  haptic('success');

  /* ── FIREWORKS ── */
  const canvas = document.getElementById('fwCanvas');
  const ctx = canvas.getContext('2d');
  const COLS = ['#fff','#fcd34d','#34d399','#60a5fa','#f472b6','#a78bfa','#4ade80','#fbbf24'];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize(); window.addEventListener('resize', resize, {passive:true});

  class Shell {
    constructor(){
      this.x=canvas.width*(0.1+Math.random()*.8);this.y=canvas.height;
      this.vy=-(12+Math.random()*9);this.vx=(Math.random()-.5)*2;
      this.peakY=canvas.height*(0.06+Math.random()*.38);
      this.exploded=false;this.dead=false;
      this.color=COLS[Math.floor(Math.random()*COLS.length)];
    }
    update(){if(this.exploded)return;this.vy+=0.35;this.x+=this.vx;this.y+=this.vy;if(this.vy>=0||this.y<=this.peakY){this.exploded=true;this.dead=true;burst(this)}}
    draw(){if(this.exploded)return;ctx.save();ctx.fillStyle=this.color;ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}
  }
  class Particle {
    constructor(x,y,col){
      const a=Math.random()*Math.PI*2;const sp=1.5+Math.random()*7;
      this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;
      this.alpha=1;this.decay=.010+Math.random()*.014;
      this.gravity=.09;this.color=col;this.size=1.5+Math.random()*2;
    }
    update(){this.vx*=.985;this.vy=this.vy*.985+this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}
    draw(){if(this.alpha<=0)return;ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}
    get dead(){return this.alpha<=0}
  }
  const shells=[],particles=[];
  function burst(s){
    const cnt=50+Math.floor(Math.random()*40);
    const c2=COLS[Math.floor(Math.random()*COLS.length)];
    for(let i=0;i<cnt;i++) particles.push(new Particle(s.x,s.y,i%3===0?c2:s.color));
    haptic('medium');
  }
  function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    shells.forEach(s=>{s.update();s.draw()});
    for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1)}
    if(shells.some(s=>!s.dead)||particles.length>0) requestAnimationFrame(loop);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  const delays=[200,620,980,1380,1740,2200,2680];
  delays.forEach(d=>setTimeout(()=>{shells.push(new Shell())},d));
  setTimeout(loop,160);
  setTimeout(()=>{if(canvas.parentNode)canvas.style.display='none';},8000);
})();
</script>
</body>
</html>
