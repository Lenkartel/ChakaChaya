<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#ffffff"/>
<title>Cash Credited · ChakaChaya</title>
<link rel="icon" href="assets/ecocash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1a3a5c;--blue:#1a56db;--blue-light:#e8f0fe;
  --green:#16a34a;--green-light:#f0fdf4;
  --page:#f5f7fa;--white:#ffffff;
  --border:#e2e8f0;--border-mid:#cbd5e1;
  --ink:#0f172a;--soft:#64748b;--faint:#94a3b8;
  --font:'Inter',sans-serif;
  --r:12px;--r-lg:16px;
  --sh:0 1px 2px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
}
@keyframes pageEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:var(--font);background:var(--page);color:var(--ink)}
.screen{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh;overflow:hidden;position:relative;animation:pageEnter .32s ease both}

/* REVEAL CURTAIN */
.nav-curtain{position:fixed;inset:0;background:var(--white);opacity:1;pointer-events:none;z-index:9999;transition:opacity .4s ease}
.nav-curtain.clear{opacity:0}

/* CANVAS */
.fw-canvas{position:fixed;inset:0;pointer-events:none!important;z-index:1;width:100%;height:100%;display:block}

/* HEADER */
.header{background:var(--white);padding:max(12px,env(safe-area-inset-top)) 16px 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:7px}
.brand img{height:22px;object-fit:contain}
.brand-sep{width:1px;height:15px;background:var(--border)}
.status-chip{background:var(--green-light);border:1px solid #bbf7d0;border-radius:999px;padding:4px 11px;font-size:11px;font-weight:700;color:var(--green)}

/* AMOUNT DISPLAY */
.amount-block{display:flex;align-items:center;gap:12px}
.success-icon-wrap{width:40px;height:40px;border-radius:50%;background:var(--green-light);border:1px solid #bbf7d0;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:iconPop .45s .1s cubic-bezier(.34,1.56,.64,1) both}
@keyframes iconPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-icon-wrap svg{stroke:var(--green);width:18px;height:18px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.amount-row{display:flex;align-items:baseline;gap:4px}
.amount-cur{font-size:14px;font-weight:600;color:var(--soft);margin-bottom:2px}
.amount-val{font-size:38px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.04em}
.amount-sub{font-size:12px;color:var(--soft);margin-top:3px}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 14px max(32px,env(safe-area-inset-bottom));overscroll-behavior:contain;min-height:0;position:relative;z-index:5;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;box-shadow:var(--sh)}
@keyframes cardIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

/* AMOUNTS ROW */
.amounts-row{display:flex;gap:8px;padding:14px}
.amt-block{flex:1;border-radius:var(--r);padding:12px;text-align:center}
.amt-pts{background:var(--page);border:1px solid var(--border)}
.amt-cash{background:var(--green-light);border:1px solid #bbf7d0}
.amt-val{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.02em}
.amt-pts .amt-val{color:var(--navy)}
.amt-cash .amt-val{color:var(--green)}
.amt-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.amt-pts .amt-lbl{color:var(--faint)}
.amt-cash .amt-lbl{color:#86efac}

/* DETAIL ROWS */
.card-hd{padding:12px 15px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700;color:var(--ink)}
.det-row{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-key{font-size:12px;color:var(--soft);font-weight:500;display:flex;align-items:center;gap:8px}
.det-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.det-val{font-size:13px;font-weight:700;color:var(--ink)}
.det-val.green{color:var(--green);font-weight:800}

/* NOTICE */
.notice{background:var(--green-light);border:1px solid #bbf7d0;border-radius:var(--r-lg);padding:13px 14px;margin-bottom:12px;font-size:12px;line-height:1.7;color:var(--soft);font-weight:500;animation:cardIn .4s .18s ease both}
.notice strong{color:var(--ink);font-weight:700}

/* SECURITY */
.sec-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:12px 0;box-shadow:var(--sh);animation:cardIn .4s .24s ease both}
.sec-row{display:flex;align-items:center;justify-content:center}
.sec-badge{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--green);letter-spacing:.4px;text-transform:uppercase;padding:0 12px}
.sec-badge+.sec-badge{border-left:1px solid var(--border)}
.sec-badge svg{stroke:var(--green);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:.8}
.powered{text-align:center;padding:8px 0 2px;font-size:9px;color:var(--faint);font-weight:500;letter-spacing:.4px;text-transform:uppercase}
</style>
</head>
<body>
<canvas class="fw-canvas" id="fwCanvas"></canvas>
<div class="nav-curtain" id="navCurtain"></div>

<div class="screen">
  <div class="header">
    <div class="header-top">
      <div class="brand"><img src="assets/econet.png" alt="Econet"><div class="brand-sep"></div><img src="assets/ecocash.png" alt="EcoCash"></div>
      <div class="status-chip">Credited ✓</div>
    </div>
    <div class="amount-block">
      <div class="success-icon-wrap"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div>
        <div class="amount-row"><span class="amount-cur">USD</span><span class="amount-val" id="headerAmount">0.00</span></div>
        <div class="amount-sub">Cash Credited to EcoCash Wallet</div>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- Filled by JS -->
  </div>
</div>

<script>
function haptic(s){if(!navigator.vibrate)return;var p={success:[12,60,12],medium:22};try{navigator.vibrate(p[s]||12)}catch(e){}}

(function main(){
  const curtain=document.getElementById('navCurtain');
  requestAnimationFrame(()=>setTimeout(()=>curtain.classList.add('clear'),40));

  history.replaceState({page:'thankyou'},'','');
  window.addEventListener('popstate',()=>{sessionStorage.removeItem('redeemData');window.location.href='index.html'},{passive:false});

  let rd={};try{rd=JSON.parse(sessionStorage.getItem('redeemData')||'{}')}catch(e){}
  const points=rd.points||0,usd=rd.usd||'0.00',usdFmt=rd.usdFormatted||('USD '+usd);
  const rate=rd.rate||'100 pts = USD 5.00';
  const ts=rd.timestamp?new Date(rd.timestamp).toLocaleString():new Date().toLocaleString();
  const refNo='CKC-'+Math.random().toString(36).slice(2,5).toUpperCase()+'-'+Date.now().toString(36).slice(-4).toUpperCase();

  const amtEl=document.getElementById('headerAmount');
  const target=parseFloat(usd)||0;
  if(target>0){const start=performance.now();function tick(ts2){const p=Math.min((ts2-start)/700,1),ease=1-Math.pow(1-p,3);amtEl.textContent=(target*ease).toFixed(2);if(p<1)requestAnimationFrame(tick);else amtEl.textContent=target.toFixed(2)}requestAnimationFrame(tick)}
  else amtEl.textContent=parseFloat(usd).toFixed(2);

  const body=document.querySelector('.body');

  // Redemption card
  const redeemCard=document.createElement('div');
  redeemCard.className='card';
  redeemCard.style.animation='cardIn .4s .06s ease both';
  redeemCard.innerHTML=`
    <div class="card-hd" style="display:flex;align-items:center;justify-content:space-between">
      <span>ChakaChaya Redeemed</span>
      <span style="font-size:10px;font-weight:600;background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;padding:2px 8px;border-radius:999px">Credited ✓</span>
    </div>
    <div class="amounts-row">
      <div class="amt-block amt-pts"><div class="amt-val">${Number(points).toLocaleString()}</div><div class="amt-lbl">Points</div></div>
      <div class="amt-block amt-cash"><div class="amt-val">${usdFmt}</div><div class="amt-lbl">Cash Received</div></div>
    </div>`;
  body.appendChild(redeemCard);

  function mkIcon(colour,svgPath){return `<div class="det-icon" style="background:${colour}18">${svgPath}</div>`}
  const svgClock=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const svgRate=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>`;
  const svgTick=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const svgRef=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;

  const detailCard=document.createElement('div');
  detailCard.className='card';detailCard.style.animation='cardIn .4s .12s ease both';
  detailCard.innerHTML=`
    <div class="card-hd">Redemption Details</div>
    <div class="det-row"><div class="det-key">${mkIcon('#1a56db',svgRate)} Conversion Rate</div><div class="det-val">${rate}</div></div>
    <div class="det-row"><div class="det-key">${mkIcon('#16a34a',svgTick)} Cash Credited</div><div class="det-val green">${usdFmt}</div></div>
    <div class="det-row"><div class="det-key">${mkIcon('#d97706',svgClock)} Date &amp; Time</div><div class="det-val">${ts}</div></div>
    <div class="det-row"><div class="det-key">${mkIcon('#6366f1',svgRef)} Reference</div><div class="det-val">${refNo}</div></div>`;
  body.appendChild(detailCard);

  const notice=document.createElement('div');
  notice.className='notice';
  notice.innerHTML=`<strong>Congratulations!</strong> Your ChakaChaya points have been successfully redeemed. <strong>${usdFmt}</strong> has been credited to your EcoCash wallet and is available immediately. Thank you for participating in the EcoCash Rewards Programme.`;
  body.appendChild(notice);

  const secCard=document.createElement('div');
  secCard.className='sec-card';
  secCard.innerHTML=`
    <div class="sec-row">
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>256-bit SSL</div>
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>PCI DSS</div>
      <div class="sec-badge"><svg width="10" height="10" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Verified</div>
    </div>
    <div class="powered">Powered by Econet EcoCash Zimbabwe</div>`;
  body.appendChild(secCard);

  haptic('success');

  // Fireworks
  const canvas=document.getElementById('fwCanvas');
  const ctx=canvas.getContext('2d');
  const COLS=['#fff','#fbbf24','#34d399','#60a5fa','#f472b6','#a78bfa','#4ade80'];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize,{passive:true});
  class Shell{constructor(){this.x=canvas.width*(0.1+Math.random()*.8);this.y=canvas.height;this.vy=-(12+Math.random()*9);this.vx=(Math.random()-.5)*2;this.peakY=canvas.height*(0.06+Math.random()*.38);this.exploded=false;this.dead=false;this.color=COLS[Math.floor(Math.random()*COLS.length)]}update(){if(this.exploded)return;this.vy+=0.35;this.x+=this.vx;this.y+=this.vy;if(this.vy>=0||this.y<=this.peakY){this.exploded=true;this.dead=true;burst(this)}}draw(){if(this.exploded)return;ctx.save();ctx.fillStyle=this.color;ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}}
  class Particle{constructor(x,y,col){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*7;this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.alpha=1;this.decay=.01+Math.random()*.014;this.gravity=.09;this.color=col;this.size=1.5+Math.random()*2}update(){this.vx*=.985;this.vy=this.vy*.985+this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}draw(){if(this.alpha<=0)return;ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.shadowBlur=6;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}get dead(){return this.alpha<=0}}
  const shells=[],particles=[];
  function burst(s){const cnt=50+Math.floor(Math.random()*40),c2=COLS[Math.floor(Math.random()*COLS.length)];for(let i=0;i<cnt;i++)particles.push(new Particle(s.x,s.y,i%3===0?c2:s.color));haptic('medium')}
  function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);shells.forEach(s=>{s.update();s.draw()});for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1)}if(shells.some(s=>!s.dead)||particles.length>0)requestAnimationFrame(loop);else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none'}}
  const delays=[200,620,980,1380,1740,2200,2680];
  delays.forEach(d=>setTimeout(()=>{shells.push(new Shell())},d));
  setTimeout(loop,160);setTimeout(()=>{if(canvas.parentNode)canvas.style.display='none'},8000);
})();
</script>
</body>
</html>
