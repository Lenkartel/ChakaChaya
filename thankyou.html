<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#005F8E"/>
<title>Cash Credited · ChakaChaya</title>
<link rel="icon" href="assets/ecocash.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#005F8E;--blue2:#004470;--blue3:#003558;
  --cyan:#00C2FF;
  --bg:#EFF4FA;--card:#FFFFFF;--line:rgba(0,95,142,.1);
  --t1:#0F172A;--t2:#334155;--t3:#64748B;--t4:#94A3B8;
  --ok:#10B981;--warn:#F59E0B;
  --f:'DM Sans',system-ui,sans-serif;--fm:'DM Mono',monospace;
  --rp:999px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;
  --sp:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.2,0,0,1);
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
html,body{width:100%;height:100%;height:100dvh;overflow:hidden;font-family:var(--f);background:var(--blue);-webkit-font-smoothing:antialiased}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes checkAppear{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(2deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes cardIn{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
@keyframes reveal{from{opacity:0}to{opacity:1}}
@keyframes cf-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}
@keyframes curtainClear{to{opacity:0}}

/* ── CURTAIN ── */
.nav-curtain{position:fixed;inset:0;background:var(--blue);opacity:1;pointer-events:none;z-index:9999;transition:opacity .4s var(--ease)}
.nav-curtain.clear{opacity:0}
.fw-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;width:100%;height:100%}
.cf{position:fixed;pointer-events:none;z-index:9900;animation:cf-fall linear forwards}

/* ── SCREEN ── */
.screen{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh;overflow:hidden;background:var(--blue)}

/* ── HEADER ── */
.hdr{flex-shrink:0;background:var(--blue);padding:max(12px,env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px}
.logo img{height:16px;object-fit:contain;filter:brightness(0)invert(1)}
.logo-sep{width:1px;height:12px;background:rgba(255,255,255,.25)}
.credited-chip{display:flex;align-items:center;gap:5px;background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.3);border-radius:var(--rp);padding:5px 12px;font-size:12px;font-weight:700;color:#6EE7B7}
.credited-chip svg{stroke:#6EE7B7;fill:none;stroke-width:2.5;stroke-linecap:round;width:12px;height:12px}

/* ── BODY ── */
.body{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg);padding:0 16px max(100px,calc(90px + env(safe-area-inset-bottom)));scrollbar-width:none;position:relative;z-index:5;min-height:0;border-radius:24px 24px 0 0;margin-top:-1px}
.body::-webkit-scrollbar{display:none}

/* ── SUCCESS HERO ── */
.hero{padding:28px 20px 20px;text-align:center;animation:fadeUp .4s var(--ease) both}
.check-wrap{width:76px;height:76px;border-radius:50%;background:#ECFDF5;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;animation:checkAppear .5s .1s var(--sp) both;position:relative}
.check-wrap::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid #BBF7D0;animation:reveal .3s .5s ease both}
.check-wrap svg{stroke:var(--ok);fill:none;stroke-width:3;stroke-linecap:round;width:34px;height:34px}
.hero-eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ok);margin-bottom:5px}
.hero-amt-row{display:flex;align-items:baseline;justify-content:center;gap:5px;margin-bottom:5px}
.hero-cur{font-size:18px;font-weight:600;color:var(--t3)}
.hero-amt{font-family:var(--fm);font-size:50px;font-weight:700;color:var(--t1);line-height:1;letter-spacing:-.04em}
.hero-sub{font-size:13px;color:var(--t3);line-height:1.55}
.hero-sub strong{color:var(--t1);font-weight:600}

/* ── SECTION CARD ── */
.scard{background:var(--card);border-radius:var(--r16);box-shadow:var(--sh);overflow:hidden;margin-bottom:12px;border:1px solid var(--line)}
.scard-hd{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.scard-title{font-size:13px;font-weight:700;color:var(--t1)}
.scard-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--rp)}
.badge-ok{background:#ECFDF5;color:var(--ok)}

/* Amounts row */
.amt-row{display:flex;gap:10px;padding:14px}
.amt-block{flex:1;border-radius:var(--r12);padding:14px;text-align:center}
.amt-pts{background:var(--bg)}
.amt-cash{background:#ECFDF5}
.amt-val{font-family:var(--fm);font-size:22px;font-weight:700;line-height:1;letter-spacing:-.02em}
.amt-pts .amt-val{color:var(--blue)}
.amt-cash .amt-val{color:var(--ok)}
.amt-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:5px;color:var(--t4)}
.amt-cash .amt-lbl{color:#34D399}

/* Detail rows */
.det-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--line)}
.det-k{font-size:13px;color:var(--t3);display:flex;align-items:center;gap:9px}
.det-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.det-icon svg{width:13px;height:13px;fill:none;stroke-width:2;stroke-linecap:round}
.det-v{font-size:13px;font-weight:700;color:var(--t1)}
.det-v.ok{color:var(--ok)}
.ref-badge{font-family:var(--fm);font-size:11px;font-weight:600;color:var(--t3);background:var(--bg);border:1px solid var(--line);padding:3px 9px;border-radius:var(--rp)}

/* Notice */
.notice{background:#ECFDF5;border-radius:var(--r16);padding:13px 16px;margin-bottom:12px;font-size:13px;line-height:1.65;color:var(--t2);border:1px solid rgba(16,185,129,.15)}
.notice strong{color:var(--t1);font-weight:600}

/* Sec + powered */
.sec-card{background:var(--card);border-radius:var(--r16);box-shadow:var(--sh);margin-bottom:12px;border:1px solid var(--line)}
.sec-row{display:flex;align-items:center;justify-content:center;padding:11px 0}
.sec-badge{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ok);padding:0 12px}
.sec-badge+.sec-badge{border-left:1px solid var(--line)}
.sec-badge svg{stroke:var(--ok);fill:none;stroke-width:2.5;stroke-linecap:round;width:10px;height:10px}
.powered{text-align:center;padding:8px 0;font-size:10px;color:var(--t4);letter-spacing:.3px;border-top:1px solid var(--line)}

/* CTA button */
.cta-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px max(18px,env(safe-area-inset-bottom));background:var(--card);border-top:1px solid var(--line);z-index:100}
.cta-btn{width:100%;padding:16px;border-radius:var(--r20);border:none;cursor:pointer;background:linear-gradient(135deg,var(--blue) 0%,var(--blue3) 100%);color:#fff;font-family:var(--f);font-size:15px;font-weight:700;box-shadow:0 4px 16px rgba(0,95,142,.3);transition:transform .14s;min-height:52px}
.cta-btn:active{transform:scale(.97)}
</style>
</head>
<body>

<canvas class="fw-canvas" id="fwCanvas"></canvas>
<div class="nav-curtain" id="navCurtain"></div>

<div class="screen">

  <!-- HEADER -->
  <div class="hdr">
    <div class="logo"><img src="assets/ecocash.png" alt="EcoCash"><div class="logo-sep"></div><img src="assets/econet.png" alt="Econet"></div>
    <div class="credited-chip">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Cash Credited
    </div>
  </div>

  <!-- BODY -->
  <main class="body" id="bodyEl">
    <div class="hero">
      <div class="check-wrap" aria-hidden="true">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="hero-eyebrow">Cash Credited</div>
      <div class="hero-amt-row">
        <span class="hero-cur">USD</span>
        <span class="hero-amt" id="heroAmount">0.00</span>
      </div>
      <p class="hero-sub">Successfully credited to your <strong>EcoCash wallet</strong>.<br>Funds are available immediately.</p>
    </div>
  </main>

  <!-- STICKY CTA -->
  <div class="cta-bar">
    <button class="cta-btn" onclick="window.location.href='index.html'">Spin Again Tomorrow</button>
  </div>

</div>

<script>
/* ════════ PRESERVED JS LOGIC ════════ */
function haptic(s){if(!navigator.vibrate)return;try{navigator.vibrate({success:[12,60,12],medium:22}[s]||12)}catch(e){}}

(function main(){
  /* Curtain reveal */
  const curtain=document.getElementById('navCurtain');
  requestAnimationFrame(()=>setTimeout(()=>curtain.classList.add('clear'),40));

  history.replaceState({page:'thankyou'},'','');
  window.addEventListener('popstate',()=>{sessionStorage.removeItem('redeemData');window.location.href='index.html'},{passive:false});

  let rd={};try{rd=JSON.parse(sessionStorage.getItem('redeemData')||'{}')}catch(e){}
  const points=rd.points||0,usd=rd.usd||'0.00',usdFmt=rd.usdFormatted||('USD '+usd);
  const rate=rd.rate||'100 pts = USD 5.00';
  const ts=rd.timestamp?new Date(rd.timestamp).toLocaleString('en-ZW',{dateStyle:'medium',timeStyle:'short'}):new Date().toLocaleString();
  const refNo='CKC-'+Math.random().toString(36).slice(2,5).toUpperCase()+'-'+Date.now().toString(36).slice(-4).toUpperCase();

  /* Hero count-up */
  const amtEl=document.getElementById('heroAmount');
  const target=parseFloat(usd)||0;
  if(target>0){
    const start=performance.now();
    function tick(t){const p=Math.min((t-start)/700,1),ease=1-Math.pow(1-p,3);amtEl.textContent=(target*ease).toFixed(2);if(p<1)requestAnimationFrame(tick);else amtEl.textContent=target.toFixed(2)}
    requestAnimationFrame(tick);
  }else amtEl.textContent=parseFloat(usd).toFixed(2);

  const body=document.getElementById('bodyEl');
  function addCard(html,d){setTimeout(()=>{const div=document.createElement('div');div.innerHTML=html;const el=div.firstElementChild;el.style.cssText=`animation:cardIn .38s ${d*60}ms cubic-bezier(.22,1,.36,1) both`;body.appendChild(el)},d*60)}

  /* Summary card */
  addCard(`<div class="scard">
    <div class="scard-hd"><span class="scard-title">ChakaChaya Redeemed</span><span class="scard-badge badge-ok">Credited ✓</span></div>
    <div class="amt-row">
      <div class="amt-block amt-pts"><div class="amt-val">${Number(points).toLocaleString()}</div><div class="amt-lbl">Points</div></div>
      <div class="amt-block amt-cash"><div class="amt-val">${usdFmt}</div><div class="amt-lbl">Cash</div></div>
    </div>
  </div>`,1);

  /* Details */
  const icon=(bg,sc,path)=>`<div class="det-icon" style="background:${bg}"><svg viewBox="0 0 24 24" stroke="${sc}">${path}</svg></div>`;
  addCard(`<div class="scard">
    <div class="scard-hd"><span class="scard-title">Redemption details</span></div>
    <div class="det-row"><div class="det-k">${icon('#EFF4FA','var(--blue)','<line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>')}Conversion rate</div><div class="det-v">${rate}</div></div>
    <div class="det-row"><div class="det-k">${icon('#ECFDF5','var(--ok)','<polyline points="20 6 9 17 4 12"/>')}Cash credited</div><div class="det-v ok">${usdFmt}</div></div>
    <div class="det-row"><div class="det-k">${icon('#FEF3C7','var(--warn)','<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>')}Date &amp; time</div><div class="det-v" style="font-size:12px">${ts}</div></div>
    <div class="det-row"><div class="det-k">${icon('#F8FAFC','var(--t3)','<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>')}Reference</div><div class="ref-badge">${refNo}</div></div>
  </div>`,2);

  /* Notice */
  addCard(`<div class="notice"><strong>Congratulations!</strong> Your ChakaChaya points have been redeemed. <strong>${usdFmt}</strong> has been credited to your EcoCash wallet and is available immediately. Thank you for participating in the EcoCash Rewards Programme.</div>`,3);

  /* Security */
  addCard(`<div class="sec-card">
    <div class="sec-row">
      <div class="sec-badge"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>256-bit SSL</div>
      <div class="sec-badge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>PCI DSS</div>
      <div class="sec-badge"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>Verified</div>
    </div>
    <div class="powered">Powered by Econet EcoCash Zimbabwe · ChakaChaya Rewards</div>
  </div>`,4);

  haptic('success');

  /* Fireworks — preserved exactly */
  const canvas=document.getElementById('fwCanvas');
  const ctx=canvas.getContext('2d');
  const COLS=['#fff','#FDE68A','#34D399','#60A5FA','#F472B6','#A78BFA','#4ADE80','#FBBF24'];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize,{passive:true});
  class Shell{constructor(){this.x=canvas.width*(.1+Math.random()*.8);this.y=canvas.height;this.vy=-(12+Math.random()*9);this.vx=(Math.random()-.5)*2;this.peakY=canvas.height*(.06+Math.random()*.38);this.exploded=false;this.dead=false;this.color=COLS[~~(Math.random()*COLS.length)]}update(){if(this.exploded)return;this.vy+=.35;this.x+=this.vx;this.y+=this.vy;if(this.vy>=0||this.y<=this.peakY){this.exploded=true;this.dead=true;burst(this)}}draw(){if(this.exploded)return;ctx.save();ctx.fillStyle=this.color;ctx.globalAlpha=.9;ctx.beginPath();ctx.arc(this.x,this.y,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}}
  class Particle{constructor(x,y,col){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*7;this.x=x;this.y=y;this.vx=Math.cos(a)*sp;this.vy=Math.sin(a)*sp;this.alpha=1;this.decay=.01+Math.random()*.014;this.gravity=.09;this.color=col;this.size=1.5+Math.random()*2}update(){this.vx*=.985;this.vy=this.vy*.985+this.gravity;this.x+=this.vx;this.y+=this.vy;this.alpha-=this.decay}draw(){if(this.alpha<=0)return;ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.shadowBlur=5;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore()}get dead(){return this.alpha<=0}}
  const shells=[],particles=[];
  function burst(s){const n=48+~~(Math.random()*36),c2=COLS[~~(Math.random()*COLS.length)];for(let i=0;i<n;i++)particles.push(new Particle(s.x,s.y,i%3===0?c2:s.color));haptic('medium')}
  function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);shells.forEach(s=>{s.update();s.draw()});for(let i=particles.length-1;i>=0;i--){particles[i].update();particles[i].draw();if(particles[i].dead)particles.splice(i,1)}if(shells.some(s=>!s.dead)||particles.length>0)requestAnimationFrame(loop);else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none'}}
  [200,620,980,1380,1740,2200,2680].forEach(d=>setTimeout(()=>{shells.push(new Shell())},d));
  setTimeout(loop,160);setTimeout(()=>{canvas.style.display='none'},9000);
})();
</script>
</body>
</html>
